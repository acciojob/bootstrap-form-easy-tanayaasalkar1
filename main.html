<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form class="needs-validation" novalidate>
  <h1 class="text-center mb-5">Internship Form</h1>

  <div class="form-row">
    <div class="col-md-4 mb-3">
     <label for="first-name-input" class="form-label">First Name</label>
      <input
        type="text"
        class="form-control"
        id="first-name-input"
        required
      />
      <div class="invalid-feedback">
        First name required!
      </div>
    </div>

    <div class="col-md-4 mb-3">
     <label for="last-name-input" class="form-label">Last Name</label>
      <input
        type="text"
        class="form-control"
        id="last-name-input"
        required
      />
      <div class="invalid-feedback">
        Last name required!
      </div>
    </div>

    <div class="col-md-4 mb-3">
     <label for="email-input" class="form-label">Email Address</label>
      <input
        type="email"
        class="form-control"
        id="email-input"
        placeholder="xyz@abc.com"
        required
      />
      <div class="invalid-feedback">
        Email required!
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="col-md-6 mb-3">
      <label for="college-input" class="form-label">College</label>
      <input
        type="text"
        class="form-control"
        id="college-input"
        required
      />
      <div class="invalid-feedback">
        Please provide a valid college.
      </div>
    </div>

    <div class="col-md-3 mb-3">
     <label for="grad-year-select" class="form-label">Graduation Year</label>
     <select id="grad-year-select" class="form-select" required>
        <option value="" selected>Choose...</option>
        <option>2020</option>
        <option>2021</option>
        <option>2022</option>
        <option>2023</option>
      </select>
      <div class="invalid-feedback">
        Please select a valid Graduation Year.
      </div>
    </div>

    <div class="col-md-3 mb-3">
     <label for="roll-no-input" class="form-label">Roll No.</label>
      <input
        type="text"
        class="form-control"
        id="roll-no-input"
        required
      />
      <div class="invalid-feedback">
        Please provide a valid Roll no.
      </div>
    </div>
  </div>

  <div class="form-group">
    <div class="form-check">
      <input
        class="form-check-input"
        type="checkbox"
        id="conditions-checkbox"
        required
      />
      <label class="form-check-label" for="conditions-checkbox">
        Agree to terms and conditions
      </label>
      <div class="invalid-feedback">
        You must agree before submitting.
      </div>
    </div>
  </div>

  <button class="btn btn-primary" type="submit">
    Submit form
  </button>
</form>

	
    <script type="text/javascript" src="./script.js"</script>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</script>

</body>

</html>
